<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080c14" />
  <title>老宋 · 空压机 AI 维修副驾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-badge"><svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="16" cy="16" r="12"/><path d="M16 16 L16 6"/><circle cx="16" cy="16" r="2.2" fill="currentColor" stroke="none"/><path d="M6.5 16 H9 M23 16 H25.5 M16 6.5 V9" stroke-width="1.5" opacity=".55"/></svg></span>
      <div class="brand-txt">
        <strong>老宋 · 维修副驾</strong>
        <small><span class="status-dot" id="conn-dot"></span><span id="conn-state">未配置 API</span></small>
      </div>
    </div>
    <div class="actions">
      <button id="btn-kb" class="icon-btn" title="知识库文件">📎</button>
      <button id="btn-cases" class="icon-btn" title="案例库">📚</button>
      <button id="btn-settings" class="icon-btn" title="设置">⚙️</button>
      <button id="btn-new" class="icon-btn" title="新对话">➕</button>
    </div>
  </header>

  <main id="chat" class="chat"></main>

  <form id="input-bar" class="input-bar" autocomplete="off">
    <textarea id="user-input" rows="1" placeholder="描述故障现象，如：空压机排气温度到105℃，电流正常，频繁跳机…"></textarea>
    <button id="btn-send" type="submit" class="send-btn" aria-label="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </form>

  <!-- 设置面板 -->
  <div id="settings-modal" class="modal hidden">
    <div class="sheet">
      <div class="sheet-head">
        <h3>⚙️ 连接设置</h3>
        <button class="close-x" data-close="settings-modal">✕</button>
      </div>
      <div class="sheet-body">
        <label>运行模式</label>
        <select id="set-mode">
          <option value="online">在线 LLM（需 API Key）</option>
          <option value="offline">离线规则引擎（零 Key，可离线）</option>
        </select>
        <p class="hint">📴 离线模式不调用任何大模型，基于内置知识库故障树直接输出，手机打开即用、无需网络。</p>
        <label>API 端点</label>
        <select id="set-endpoint"></select>
        <label>自定义端点 URL（选"自定义"时填写）</label>
        <input id="set-url" type="text" placeholder="https://your-endpoint/v1" />
        <label>模型名</label>
        <input id="set-model" type="text" placeholder="hunyuan-turbos-latest" />
        <label>API Key（仅存本机浏览器，不上传）</label>
        <input id="set-key" type="password" placeholder="sk-..." />
        <p class="hint">🔒 Key 仅保存在你当前手机/浏览器，不会发送到除 LLM 服务商外的任何地方。</p>
        <div class="row">
          <button id="set-save" class="primary">保存</button>
          <button id="set-test" class="ghost">测试连接</button>
          <button id="set-clear" class="danger-ghost">清空</button>
        </div>
        <p id="set-msg" class="msg"></p>
      </div>
    </div>
  </div>

  <!-- 案例库面板 -->
  <div id="cases-modal" class="modal hidden">
    <div class="sheet wide">
      <div class="sheet-head">
        <h3>📚 案例库 / 审核队列</h3>
        <button class="close-x" data-close="cases-modal">✕</button>
      </div>
      <div class="sheet-body">
        <div class="cases-toolbar">
          <span id="cases-count" class="muted">0 条</span>
          <button id="cases-export" class="ghost sm">导出 JSON</button>
          <button id="cases-refresh" class="ghost sm">刷新</button>
        </div>
        <ul id="cases-list" class="cases-list"></ul>
        <div id="case-detail" class="case-detail hidden"></div>
      </div>
    </div>
  </div>

  <!-- 知识库文件上传面板 -->
  <div id="kb-modal" class="modal hidden">
    <div class="sheet wide">
      <div class="sheet-head">
        <h3>📎 知识库文件</h3>
        <button class="close-x" data-close="kb-modal">✕</button>
      </div>
      <div class="sheet-body">
        <div id="kb-drop" class="kb-drop">
          <div class="kb-drop-ic">📥</div>
          <div class="kb-drop-txt">拖拽文件到此处，或 <label class="kb-link">点击选择<input id="kb-file" type="file" multiple accept=".pdf,.doc,.docx,.txt,.md,.markdown,.mp3,.wav,.m4a,.ogg,.mp4,.webm,.mov" hidden /></label></div>
          <div class="kb-drop-hint">支持 PDF · Word(.docx) · TXT/MD 自动入库检索；音频/视频可 AI 转写或手动粘贴文本</div>
        </div>
        <div class="kb-stats"><span id="kb-stat" class="muted">0 个文件 · 0 段知识</span></div>
        <ul id="kb-list" class="kb-list"></ul>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/knowledge.js"></script>
  <script src="js/offline-engine.js"></script>
  <script src="js/cases.js"></script>
  <script src="js/uploads.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
